<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>属性</title>
</head>
<body>
    color颜色
    <hr color="green"/>
    <hr color="red"/>
    width宽度
    <hr color="yellow" width="300"/>
    align对齐
    <hr color="yellow" width="300" align="left"/>
    hr默认有阴影
    <hr/>
    加noshade="noshade"或noshade取消阴影
    <hr noshade="noshade"/>
</body>
</html>
