<!-- 告诉浏览器用的语法是html几 -->
<!DOCTYPE html>
<!-- lang告诉浏览器本网页是中文还是英文，浏览器可以弹出自带的翻译插件 -->
<html lang="zh-CN">
<head>
    <!-- META标签用来描述一个HTML网页文档的属性，例如作者、日期和时间、网页描述、关键词、页面刷新等 -->
    <!-- charset告诉浏览器代码用什么字符集解码 -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VsCode!快捷生成</title>
</head>
<body>
    <center>
       VsCode!快捷生成 
    </center><br/>
    <h2>
        插件：
    </h2>
    Auto rename tag 自动同步改标签<br/>
    view-in-browser 浏览器预览<br/>
    live Server 模拟启动服务器<br/>
    live preview VsCode内置浏览器服务器预览<br/>
</body>
</html>
