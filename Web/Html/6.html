<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特殊符号</title>
</head>
<body>
    &lt;左尖括号
    <br/>
    &gt;右尖括号
    <br/>
    &nbsp;空格(受字体影响)<br/>
    &emsp;空格(不受字体影响宽度为一个中文字符，推荐使用，缩进大小固定)<br/>
    &copy;版权<br/>
    &trade;商标<br/>
    &reg;商标<br/>
    
</body>
</html>
