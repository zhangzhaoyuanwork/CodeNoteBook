<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签</title>
</head>
<body>
    <!-- h1标签权重最大，搜索引擎优先根据h1标签检索，爬取h1中的内容落库 -->
    <h1>
        h1一级标题
    </h1>
    <h2>
        h2二级标题
    </h2>
    <h3>
        h3三级标题
    </h3>
    <h4>
       h4四级标题
    </h4>
    <h5>
        h5五级标题
    </h5>
    <h6>
        h6六级标题
    </h6>
    <p>
        p段落段落段落段落段落段落段落
    </p>
        <br/>
        br换行
        <br/>
        hr水平线
        <hr/>
    

<br/>
<!-- strong，em，del搜索引擎友好 -->
    <b>b加粗</b>
    <br/>
    <strong>strong建议优先使用加粗</strong><br/>
    <i>i用倾斜</i>
    <br/>
    <em>em建议优先使用倾斜</em><br/>
    <s>s删除线</s>
    <br/>
    <del>del建议优先使用删除</del><br/>
    <u>u下划线</u><br/>
    sub<sub>下标</sub><br/>
    sup<sup>上标</sup><br/>


    
</body>
</html>
